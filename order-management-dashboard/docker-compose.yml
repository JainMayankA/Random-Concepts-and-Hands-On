version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ../event-sourcing-cqrs
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orders
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: .
    ports: ["3000:3000"]
    environment:
      API_BASE_URL: http://api:8000
      # JWT_SECRET must be set — no default to prevent accidental insecure deployments.
      # Generate one with: openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var must be set before starting}
      NODE_ENV: production
    depends_on: [api]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/logout || exit 1"]
      interval: 10s
      retries: 5
