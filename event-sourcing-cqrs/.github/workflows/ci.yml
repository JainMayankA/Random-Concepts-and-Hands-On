name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: |
          touch domain/__init__.py domain/aggregates/__init__.py \
                store/__init__.py projections/__init__.py \
                sagas/__init__.py api/__init__.py tests/__init__.py
          pytest tests/ -v --tb=short
      - run: pip install ruff && ruff check domain/ store/ projections/ sagas/ api/
